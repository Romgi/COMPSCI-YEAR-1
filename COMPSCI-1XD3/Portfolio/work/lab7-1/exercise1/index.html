<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab 7.1 Exercise 1</title>

</head>

<body>
    <main>
        <h1>Exercise 1: GuessingGame</h1>
        <p>Guess a number from 1 to 100.</p>

        <form id="guessForm">
            <input id="guessInput" type="number" min="1" max="100" placeholder="Enter guess">
            <button type="submit">Guess</button>
        </form>

        <div id="message"></div>
        <div id="state"></div>
    </main>
    <script src="script.js"></script>
</body>

</html>
